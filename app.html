<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POSTURA Studio｜姿勢分析</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="app-header no-print">
    <a class="app-back" href="./">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      <span>トップへ戻る</span>
    </a>
    <div class="brand">
      <span class="brand-mark">POSTURA</span>
      <span class="brand-divider"></span>
      <span class="brand-sub">Posture Analysis Studio</span>
    </div>
    <div class="header-actions">
      <button id="settings-btn" class="icon-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>設定</span>
      </button>
      <button id="reset-btn" class="icon-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1.2 13.2A2 2 0 0 1 15.8 21H8.2a2 2 0 0 1-2-1.8L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        <span>クリア</span>
      </button>
      <button id="print-btn" class="icon-btn" type="button" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        <span>印刷</span>
      </button>
    </div>
  </header>

  <main class="app-main">
    <section class="patient-info no-print">
      <div class="field">
        <label for="patient-name">患者氏名（任意・端末内のみ）</label>
        <input id="patient-name" type="text" autocomplete="off" placeholder="例：山田 太郎" />
      </div>
      <div class="field">
        <label for="patient-date">撮影日</label>
        <input id="patient-date" type="date" />
      </div>
      <label class="consent">
        <input id="consent-check" type="checkbox" />
        <span>AIによる所見生成のため、撮影画像と計測値を外部AIに送信することを患者から同意取得済み</span>
      </label>
    </section>

    <div class="carousel-dots no-print" id="carousel-dots" aria-hidden="true">
      <span class="dot" data-view="front"></span>
      <span class="dot" data-view="back"></span>
      <span class="dot" data-view="left"></span>
      <span class="dot" data-view="right"></span>
    </div>

    <section class="upload-grid">
      <article class="upload-card" data-view="front">
        <h2>正面</h2>
        <label class="dropzone">
          <input type="file" accept="image/*" data-view="front" />
          <span class="dropzone-hint">タップして写真を選択</span>
        </label>
        <div class="canvas-wrap"><canvas data-view="front"></canvas></div>
        <ul class="metric-list" data-view="front"></ul>
      </article>
      <article class="upload-card" data-view="back">
        <h2>背面</h2>
        <label class="dropzone">
          <input type="file" accept="image/*" data-view="back" />
          <span class="dropzone-hint">タップして写真を選択</span>
        </label>
        <div class="canvas-wrap"><canvas data-view="back"></canvas></div>
        <ul class="metric-list" data-view="back"></ul>
      </article>
      <article class="upload-card" data-view="left">
        <h2>左側面</h2>
        <label class="dropzone">
          <input type="file" accept="image/*" data-view="left" />
          <span class="dropzone-hint">タップして写真を選択</span>
        </label>
        <div class="canvas-wrap"><canvas data-view="left"></canvas></div>
        <ul class="metric-list" data-view="left"></ul>
      </article>
      <article class="upload-card" data-view="right">
        <h2>右側面</h2>
        <label class="dropzone">
          <input type="file" accept="image/*" data-view="right" />
          <span class="dropzone-hint">タップして写真を選択</span>
        </label>
        <div class="canvas-wrap"><canvas data-view="right"></canvas></div>
        <ul class="metric-list" data-view="right"></ul>
      </article>
    </section>

    <section class="summary-section">
      <div class="summary-actions no-print">
        <button id="analyze-btn" class="icon-btn icon-btn--primary" type="button" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="3" y1="20" x2="21" y2="20"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="18" y1="20" x2="18" y2="10"/>
          </svg>
          <span>解析結果</span>
        </button>
        <span id="status-text" class="status-text"></span>
      </div>
      <div id="summary-output" class="summary-output"></div>
    </section>
  </main>

  <dialog id="settings-dialog" class="settings-dialog">
    <form method="dialog">
      <h2>設定</h2>
      <div class="field">
        <label for="ai-mode">接続方法</label>
        <select id="ai-mode">
          <option value="proxy">プロキシ経由（推奨・APIキー不要）</option>
          <option value="direct">直接呼び出し（自分のAPIキーを使う）</option>
        </select>
      </div>
      <div class="field">
        <label for="ai-provider">AIプロバイダー</label>
        <select id="ai-provider">
          <option value="gemini">Gemini (Google AI Studio)</option>
          <option value="openai">OpenAI (ChatGPT API)</option>
          <option value="anthropic">Anthropic (Claude API)</option>
          <option value="none">使用しない（計測値のみ表示）</option>
        </select>
      </div>
      <div class="field">
        <label for="ai-model">モデル名（任意。空ならデフォルト）</label>
        <input id="ai-model" type="text" placeholder="例: gemini-2.5-flash" />
      </div>
      <div class="field" id="proxy-url-field">
        <label for="proxy-url">プロキシURL</label>
        <input id="proxy-url" type="text" autocomplete="off" placeholder="https://posture-analysis-proxy.xxx.workers.dev" />
        <small>運用者がCloudflare Workersに設定したURL。通常は変更不要です。</small>
      </div>
      <div class="field" id="api-key-field" hidden>
        <label for="ai-key">APIキー（端末ローカル保存）</label>
        <input id="ai-key" type="password" autocomplete="off" />
        <small>ブラウザのlocalStorageに保存されます。共用端末では使用後にクリアしてください。</small>
      </div>
      <div class="dialog-actions">
        <button value="cancel">キャンセル</button>
        <button id="settings-save" value="save">保存</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="src/main.js"></script>
</body>
</html>
